# Main training configuration
# Data configuration
data_path: "data/ni225_stock.pkl"
date_column: "date"
train_start: "2010-01-01"
val_start: "2020-01-01"
test_start: "2021-01-01"
test_end: "2022-01-01"

# Feature engineering
ma_windows: [5, 10, 20]
target_range: 5
add_daily_norm: false

# Model configuration
model_name: "gru"
seq_len: 20
norm_index: 5
norm_type: "std"

# GRU model parameters
model:
  gru:
    input_dim: 8
    hidden_dim: 128
    num_layers: 2
    output_dim: 1
    dropout: 0.1

# Training configuration
batch_size: 16
n_epochs: 100
lr: 0.001
patience: 20
seed: 42
device: "cuda"

# Loss configuration
loss: "mse"

# Evaluation
k: 5
inference_only: false

# Experiment tracking
expr_name: "default_experiment"
market: "US"
wandb: false
wandb_project_name: "finml-experiments"
